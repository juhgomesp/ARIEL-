<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ganância - Ariel</title>

  <link rel="icon" type="image/png" href="favicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>

<body>

<div id="bg"></div>
<div id="overlay"></div>

<div id="container">

  <div id="player">
    <img id="cover" src="./capa.jpg" alt="Capa">
    <audio id="audio" src="./musica.mp3"></audio>

    <div id="controls">
      <button id="playBtn" onclick="togglePlay()">
        <ion-icon name="play"></ion-icon>
      </button>

      <canvas id="wave"></canvas>
    </div>
  </div>

  <div id="info">
    <h1 class="logo">GANÂNCIA</h1>
    <p class="artist">ARIEL</p>
  </div>

  <div id="links">
    <div class="col">
      <a href="https://open.spotify.com/track/5RNPPBGaGuHRqwIafUTlwQ?si=qNU8xYNVQOiku3iOTN5rGQ" target="_blank" rel="noopener noreferrer">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg" class="icon">Spotify
      </a>
      <a href="" target="_blank" rel="noopener noreferrer">
        <ion-icon name="musical-notes-outline"></ion-icon>Apple Music
      </a>
      <a href="https://youtu.be/x51MrNddvJ4?si=Qv1-s0UHLWp6Ta3r" target="_blank" rel="noopener noreferrer">
        <ion-icon name="logo-youtube"></ion-icon>YouTube
      </a>
    </div>

    <div class="col">
      <a href="https://soundcloud.com/ariel-musics/gana-ncia?ref=clipboard&p=i&c=1&si=8ED3B04F1FF849C28B134BA779A28A2A&utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing" target="_blank" rel="noopener noreferrer">
        <ion-icon name="cloud"></ion-icon>SoundCloud
      </a>
      <a href="https://www.instagram.com/ariel.m4a/" target="_blank" rel="noopener noreferrer">
        <ion-icon name="logo-instagram"></ion-icon>Instagram
      </a>
      <button onclick="toggleContato()"><ion-icon name="mail"></ion-icon>Contato</button>
    </div>
  </div>

  <div id="contato">
    <p>📩 gotalktoariel@gmail.com</p>
  </div>

  <footer>
    © 2026 Ariel. Site desenvolvido por Julia Pereira.
  </footer>

</div>

<script src="script.js"></script>
</body>
</html>
